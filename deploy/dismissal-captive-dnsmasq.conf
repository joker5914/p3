# Dismissal captive-portal DNS hijack
# ---------------------------------------------------------------------------
# Installed by deploy/install.sh into /etc/NetworkManager/dnsmasq-shared.d/.
# NetworkManager's `ipv4.method=shared` connections (i.e. our setup-AP)
# launch their own dnsmasq instance and load every *.conf file from this
# directory.
#
# `address=/#/10.42.0.1` resolves every DNS query made by clients on the
# AP to the gateway IP — the captive portal HTTP server.  Phones probe
# well-known endpoints (captive.apple.com, connectivitycheck.gstatic.com,
# www.msftconnecttest.com, etc.) over HTTP on first join; receiving our
# page back instead of the expected probe response triggers the OS-level
# captive-portal sign-in banner that auto-launches the setup page.
address=/#/10.42.0.1

# Cap negative-response cache so a bad lookup doesn't linger after the
# user has provisioned and joined a real network.
neg-ttl=60
