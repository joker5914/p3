# /etc/logrotate.d/p3
# Rotates any file-based logs written by P3 services.
# Journal logs are handled automatically by journald (see journald.conf).

/opt/p3/Backend/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0640 p3 p3
    sharedscripts
    postrotate
        # Signal the scanner to reopen log files if it has any open handles
        systemctl kill --signal=HUP p3-scanner.service 2>/dev/null || true
    endscript
}
