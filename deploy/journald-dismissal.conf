# /etc/systemd/journald.conf.d/dismissal.conf
# Cap journal disk usage on the RPi SD card.
# This file is copied to /etc/systemd/journald.conf.d/ by install.sh

[Journal]
# Persist the journal across reboots.  Bookworm's default is "auto",
# which falls back to volatile (/run/log/journal) when /var/log/journal
# doesn't exist — and journalctl -b -1 silently returns nothing in that
# case.  That made every field-debug session blind to what happened on
# the prior boot.  With Storage=persistent, journald creates
# /var/log/journal on its own at start and keeps logs across reboots.
Storage=persistent
# Keep at most 100 MB of journal on disk
SystemMaxUse=100M
# Rotate individual journal files at 10 MB
SystemMaxFileSize=10M
# Keep logs for 14 days max
MaxRetentionSec=2week
# Forward to syslog disabled (reduces I/O on SD card)
ForwardToSyslog=no
