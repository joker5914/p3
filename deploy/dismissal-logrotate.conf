# /etc/logrotate.d/dismissal
# Rotates any file-based logs written by Dismissal services.
# Journal logs are handled automatically by journald (see journald.conf).

/opt/dismissal/Backend/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0640 dismissal dismissal
    sharedscripts
    postrotate
        # Signal the scanner to reopen log files if it has any open handles
        systemctl kill --signal=HUP dismissal-scanner.service 2>/dev/null || true
    endscript
}
