# /etc/systemd/journald.conf.d/p3.conf
# Cap journal disk usage on the RPi SD card.
# This file is copied to /etc/systemd/journald.conf.d/ by install.sh

[Journal]
# Keep at most 100 MB of journal on disk
SystemMaxUse=100M
# Rotate individual journal files at 10 MB
SystemMaxFileSize=10M
# Keep logs for 14 days max
MaxRetentionSec=2week
# Forward to syslog disabled (reduces I/O on SD card)
ForwardToSyslog=no
