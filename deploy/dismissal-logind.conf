# Dismissal Scanner — disable systemd-logind's default power-button handling
# ---------------------------------------------------------------------------
# Installed by deploy/install.sh into /etc/systemd/logind.conf.d/.
#
# Logind's default `HandlePowerKey=poweroff` would shut the Pi down the
# moment our factory-reset daemon sees the button held, eating the
# trigger.  Tell logind to ignore the button so:
#   * a clean tap is consumed by nothing (the daemon ignores short presses)
#   * the held-during-boot trigger reaches dismissal_factory_reset.py
#
# Operators do clean shutdowns via `sudo systemctl poweroff` or by pulling
# the plug (BCM2835 watchdog + tmpfs /var/log keep the SD card safe).

[Login]
HandlePowerKey=ignore
HandlePowerKeyLongPress=ignore
HandleSuspendKey=ignore
HandleHibernateKey=ignore
