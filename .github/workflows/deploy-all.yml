name: Manual Deploy (Firestore rules only)

# Manually-triggered workflow for deploying Firestore security rules and
# indexes outside of a code push. Hosting and Cloud Functions are
# deployed via `firebase deploy` (locally) or deploy-firestore.yml on
# push to master.

on:
  workflow_dispatch:

jobs:
  deploy-firestore:
    name: Deploy Firestore Rules & Indexes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore --project dismissal-cloud --non-interactive
