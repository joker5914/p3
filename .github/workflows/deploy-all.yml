name: Full Deploy (Manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - firestore
          - hosting

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/admin-portal/package-lock.json

      # Only build the frontend when deploying hosting or everything
      - name: Install frontend dependencies
        if: ${{ github.event.inputs.target != 'firestore' }}
        working-directory: Frontend/admin-portal
        run: npm ci

      - name: Build frontend
        if: ${{ github.event.inputs.target != 'firestore' }}
        working-directory: Frontend/admin-portal
        run: npm run build
        env:
          VITE_PROD_BACKEND_URL: ${{ secrets.VITE_PROD_BACKEND_URL }}
          VITE_PROD_FRONTEND_URL: ${{ secrets.VITE_PROD_FRONTEND_URL }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy — all
        if: ${{ github.event.inputs.target == 'all' }}
        run: firebase deploy --project p3-auth-762da
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy — firestore only
        if: ${{ github.event.inputs.target == 'firestore' }}
        run: firebase deploy --only firestore --project p3-auth-762da
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy — hosting only
        if: ${{ github.event.inputs.target == 'hosting' }}
        run: firebase deploy --only hosting --project p3-auth-762da
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
