name: Manual Deploy (Firestore rules only)

# This workflow was previously used to deploy the React SPA to Firebase Hosting
# (the legacy product). The frontend is now served by Firebase App Hosting which
# deploys automatically on push to master — no manual step needed.
#
# The backend is deployed by deploy-backend.yml on push to master.
#
# This workflow is kept solely for manually deploying Firestore security rules
# and indexes when needed outside of a code push.

on:
  workflow_dispatch:

jobs:
  deploy-firestore:
    name: Deploy Firestore Rules & Indexes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore --project p3-auth-762da
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
