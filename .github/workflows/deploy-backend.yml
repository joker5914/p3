name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - master
    paths:
      - 'Backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  GCP_PROJECT:   p3-fastapi
  GCR_IMAGE:     gcr.io/p3-fastapi/dismissal-backend
  CLOUDRUN_SVC:  dismissal-backend
  CLOUDRUN_REGION: us-central1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build -> Push -> Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2.1.10
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2.1.4

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker image
        working-directory: Backend
        run: |
          docker build \
            --tag ${{ env.GCR_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.GCR_IMAGE }}:latest \
            .

      - name: Push image to GCR
        run: |
          docker push ${{ env.GCR_IMAGE }}:${{ github.sha }}
          docker push ${{ env.GCR_IMAGE }}:latest

      # Cloud Run had DISMISSAL_ENCRYPTION_KEY incorrectly registered as a
      # Secret Manager reference (pointing to firebase-credentials:latest).
      # It must be a plain env var string. Remove the bad secret binding first
      # so the subsequent --update-env-vars doesn't hit a type conflict error.
      # The || true prevents failure if the binding was already cleaned up.
      - name: Remove bad DISMISSAL_ENCRYPTION_KEY secret binding
        run: |
          gcloud run services update ${{ env.CLOUDRUN_SVC }} \
            --region ${{ env.CLOUDRUN_REGION }} \
            --remove-secrets=DISMISSAL_ENCRYPTION_KEY \
            --quiet || true

      # FIREBASE_CREDENTIALS_JSON is stored in GCP Secret Manager under the
      # name "firebase-credentials" (NOT "FIREBASE_CREDENTIALS_JSON").
      # Cloud Run injects the secret value as a plain string env var at runtime.
      - name: Deploy to Cloud Run
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DISMISSAL_ENCRYPTION_KEY: ${{ secrets.DISMISSAL_ENCRYPTION_KEY }}
          VITE_PROD_BACKEND_URL: ${{ secrets.VITE_PROD_BACKEND_URL }}
          VITE_PROD_FRONTEND_URL: ${{ secrets.VITE_PROD_FRONTEND_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        run: |
          gcloud run deploy ${{ env.CLOUDRUN_SVC }} \
            --image ${{ env.GCR_IMAGE }}:${{ github.sha }} \
            --region ${{ env.CLOUDRUN_REGION }} \
            --platform managed \
            --memory 1Gi \
            --cpu 1 \
            --concurrency 50 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 3600 \
            --update-env-vars "^@@^ENV=production@@SECRET_KEY=${SECRET_KEY}@@DISMISSAL_ENCRYPTION_KEY=${DISMISSAL_ENCRYPTION_KEY}@@VITE_PROD_BACKEND_URL=${VITE_PROD_BACKEND_URL}@@VITE_PROD_FRONTEND_URL=${VITE_PROD_FRONTEND_URL}@@ALLOWED_ORIGINS=${ALLOWED_ORIGINS}" \
            --update-secrets "FIREBASE_CREDENTIALS_JSON=firebase-credentials:latest" \
            --quiet

      - name: Get deployed URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUDRUN_SVC }} \
            --region ${{ env.CLOUDRUN_REGION }} \
            --format 'value(status.url)')
          echo "service_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"

      - name: Verify deployment health
        run: |
          URL="${{ steps.url.outputs.service_url }}"
          echo "Checking health at $URL/api/v1/system/health ..."
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/v1/system/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS -- retrying in 15s ..."
            sleep 15
          done
          echo "::error::Health check failed after 8 attempts"
          exit 1
