name: Deploy Backend to Cloud Run

# Triggers automatically when backend code changes land on master.
# Also supports manual runs from the Actions tab.
on:
  push:
    branches:
      - master
    paths:
      - 'Backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  GCP_PROJECT:   p3-fastapi
  GCR_IMAGE:     gcr.io/p3-fastapi/dismissal-backend
  CLOUDRUN_SVC:  dismissal-backend
  CLOUDRUN_REGION: us-central1

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to Google Cloud ────────────────────────────────────
      # Uses a GCP Service Account key stored as a GitHub secret.
      # Alternative: replace with Workload Identity Federation for keyless auth.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      # ── Build & push the container image ───────────────────────────────
      - name: Build Docker image
        working-directory: Backend
        run: |
          docker build \
            --tag ${{ env.GCR_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.GCR_IMAGE }}:latest \
            .

      - name: Push image to GCR
        run: |
          docker push ${{ env.GCR_IMAGE }}:${{ github.sha }}
          docker push ${{ env.GCR_IMAGE }}:latest

      # ── Deploy new revision to Cloud Run ───────────────────────────────
      # Environment variables are passed here via GitHub Secrets for now.
      # TODO: migrate to GCP Console–managed env vars once fully live.
      - name: Deploy to Cloud Run
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DISMISSAL_ENCRYPTION_KEY: ${{ secrets.DISMISSAL_ENCRYPTION_KEY }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          VITE_PROD_BACKEND_URL: ${{ secrets.VITE_PROD_BACKEND_URL }}
          VITE_PROD_FRONTEND_URL: ${{ secrets.VITE_PROD_FRONTEND_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        run: |
          gcloud run deploy ${{ env.CLOUDRUN_SVC }} \
            --image ${{ env.GCR_IMAGE }}:${{ github.sha }} \
            --region ${{ env.CLOUDRUN_REGION }} \
            --platform managed \
            --memory 1Gi \
            --cpu 1 \
            --concurrency 50 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 3600 \
            --update-env-vars "^@@^ENV=production@@SECRET_KEY=${SECRET_KEY}@@DISMISSAL_ENCRYPTION_KEY=${DISMISSAL_ENCRYPTION_KEY}@@VITE_PROD_BACKEND_URL=${VITE_PROD_BACKEND_URL}@@VITE_PROD_FRONTEND_URL=${VITE_PROD_FRONTEND_URL}@@ALLOWED_ORIGINS=${ALLOWED_ORIGINS}@@FIREBASE_CREDENTIALS_JSON=${FIREBASE_CREDENTIALS_JSON}" \
            --quiet

      - name: Get deployed URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUDRUN_SVC }} \
            --region ${{ env.CLOUDRUN_REGION }} \
            --format 'value(status.url)')
          echo "service_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"

      - name: Verify deployment health
        run: |
          URL="${{ steps.url.outputs.service_url }}"
          echo "Checking health at $URL/api/v1/system/health ..."
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/v1/system/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s ..."
            sleep 15
          done
          echo "::error::Health check failed after 8 attempts"
          exit 1
