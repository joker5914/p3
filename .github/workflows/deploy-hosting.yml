name: Build and Deploy Frontend

# Builds the Vite SPA on every push and PR (catches broken builds early).
# On master pushes, also deploys to Firebase Hosting using the
# GCP_SA_KEY service account.

on:
  push:
    branches:
      - master
    paths:
      - 'Frontend/admin-portal/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-hosting.yml'
  pull_request:
    paths:
      - 'Frontend/admin-portal/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/admin-portal/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/admin-portal
        run: npm ci

      - name: Build frontend
        working-directory: Frontend/admin-portal
        run: npm run build

      - name: Confirm dist output
        run: ls -lh Frontend/admin-portal/dist/

      # Deploy steps only run on master pushes — PR builds stop after the build check.
      - name: Authenticate to GCP
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: firebase deploy --only hosting --project dismissal-cloud --non-interactive
