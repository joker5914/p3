name: Frontend Build Check

# Validates that the Vite SPA builds cleanly on every push.  Actual
# deployment to Firebase Hosting is performed by `firebase deploy`
# (locally or via deploy-all.yml).

on:
  push:
    branches:
      - master
    paths:
      - 'Frontend/admin-portal/**'
      - '.github/workflows/deploy-hosting.yml'
  pull_request:
    paths:
      - 'Frontend/admin-portal/**'
  workflow_dispatch:

jobs:
  build-check:
    name: Vite Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/admin-portal/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/admin-portal
        run: npm ci

      - name: Build frontend
        working-directory: Frontend/admin-portal
        run: npm run build

      - name: Confirm dist output
        run: ls -lh Frontend/admin-portal/dist/
