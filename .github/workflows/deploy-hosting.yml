name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - master
    paths:
      - 'Frontend/admin-portal/src/**'
      - 'Frontend/admin-portal/public/**'
      - 'Frontend/admin-portal/index.html'
      - 'Frontend/admin-portal/vite.config.js'
      - 'Frontend/admin-portal/package.json'
      - 'Frontend/admin-portal/package-lock.json'
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy-hosting:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/admin-portal/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/admin-portal
        run: npm ci

      - name: Build frontend
        working-directory: Frontend/admin-portal
        run: npm run build
        env:
          VITE_PROD_BACKEND_URL: ${{ secrets.VITE_PROD_BACKEND_URL }}
          VITE_PROD_FRONTEND_URL: ${{ secrets.VITE_PROD_FRONTEND_URL }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project p3-auth-762da
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
