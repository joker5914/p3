# Firebase App Hosting — Dismissal Admin Portal
# https://firebase.google.com/docs/app-hosting/configure
#
# This file controls the Cloud Run container that serves the built static assets
# and, critically, injects environment variables into the Vite build so the
# bundle knows where the API lives.

runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  maxInstances: 10
  minInstances: 0

env:
  # ── Baked into the Vite bundle at build time ─────────────────────────────
  # Accessible in React code as: import.meta.env.VITE_API_BASE_URL.
  # Points at the `api` Cloud Function (Firebase Functions Gen 2 Python).
  # Live updates are no longer routed through this URL — the Dashboard
  # subscribes to live_queue/{schoolId}/events directly via the Firestore
  # client SDK, so only HTTP traffic (/api/v1/**) hits this endpoint.
  - variable: VITE_API_BASE_URL
    value: https://api-4fyayqrm5a-uc.a.run.app
    availability:
      - BUILD

  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME
